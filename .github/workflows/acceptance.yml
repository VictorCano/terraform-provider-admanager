# Acceptance tests against a real Google Ad Manager TEST network.
#
# Triggers: manual `workflow_dispatch` and a weekly cron. Needs repository
# secrets and must never run for untrusted PRs. The provider test suite
# additionally refuses to run against networks whose testNetwork flag is false.
#
# There is exactly ONE shared GAM test network, so runs must never overlap:
#   - The workflow-level `concurrency` group serializes whole runs, so a manual
#     dispatch fired during the cron QUEUES instead of interleaving.
#   - `strategy.max-parallel: 1` serializes the matrix legs WITHIN a run — a
#     concurrency group does not do that on its own, and the process-wide 2 rps
#     limiter means parallel legs would only contend on the shared network.
#
# A sweeper pre-step archives/deactivates leftovers from a previously crashed
# run so they cannot poison the cron run. On SCHEDULED failures an idempotent
# issue is filed so a red cron never goes unnoticed.
#
# NOTE: the default `go test` invocation carries NO build tags, so the
# manual-only `reservedcode` collision test is excluded here by construction —
# never add `-tags` to this workflow.
name: Acceptance Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1" # weekly, Monday @ 05:00 UTC

concurrency:
  group: gam-test-network
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  acceptance:
    name: TF_ACC (${{ matrix.cli }}) against test network
    runs-on: ubuntu-latest
    # Backstop for the whole leg. Without it a hung step (see the sweep/test
    # steps' own per-step timeouts) would only be cut off by GitHub's 360-min
    # platform default; a job killed by that default concludes `cancelled`, and
    # the failure notification below is guarded to fire on cancellation too.
    timeout-minutes: 90
    strategy:
      # The two legs share the one test network; run them one at a time.
      max-parallel: 1
      fail-fast: false
      matrix:
        cli: [terraform, opentofu]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - if: matrix.cli == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - if: matrix.cli == 'opentofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_wrapper: false
      - name: Write service account credentials and network code
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ADMANAGER_TEST_NETWORK_CODE: ${{ secrets.ADMANAGER_TEST_NETWORK_CODE }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS_JSON" > "$RUNNER_TEMP/sa.json"
          chmod 600 "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"
          echo "ADMANAGER_TEST_NETWORK_CODE=$ADMANAGER_TEST_NETWORK_CODE" >> "$GITHUB_ENV"
      - name: Configure OpenTofu harness env
        if: matrix.cli == 'opentofu'
        # The plugin-testing harness defaults to `terraform` and auto-injects a
        # required_providers block under the `hashicorp` namespace. Pointing it
        # at the tofu binary plus the OpenTofu registry host/namespace works
        # around that namespace collision (validated live in PR-D).
        run: |
          {
            echo "TF_ACC_TERRAFORM_PATH=$(which tofu)"
            echo "TF_ACC_PROVIDER_HOST=registry.opentofu.org"
            echo "TF_ACC_PROVIDER_NAMESPACE=hashicorp"
          } >> "$GITHUB_ENV"
      - name: Sweep leftovers from a prior crashed run
        # -sweep=global archives/deactivates dangling tf-acc-* objects (the
        # sweeper hard-guards on testNetwork==true itself). `go test -timeout`
        # is INERT under -sweep=global: terraform-plugin-testing's TestMain runs
        # the sweepers and exits BEFORE calling m.Run(), and m.Run() is what arms
        # the stdlib -timeout alarm. So bound this step with the runner's own
        # step-level timeout-minutes instead (a stalled TCP read or a long
        # Retry-After loop in Client.do() has no other time bound).
        timeout-minutes: 10
        run: go test ./internal/provider -v -sweep=global
      - name: Run acceptance tests
        env:
          TF_ACC: "1"
        run: go test -v -timeout 60m ./internal/provider/
      - name: Open issue on scheduled failure
        # Only cron runs auto-file: a manual dispatch already surfaces failures
        # to whoever triggered it. Idempotent — one open issue per marker title.
        # `cancelled()` is included because a job killed by a timeout (this job's
        # timeout-minutes, or GitHub's platform default) concludes `cancelled`,
        # not `failure`; without it a hung cron would file nothing.
        if: (failure() || cancelled()) && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "[acceptance] weekly run failed"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CLI: ${{ matrix.cli }}
        run: |
          gh label create canary --color FBCA04 --description "Automated maintainer canary" --force
          # List in its own step so a gh/API failure aborts here (set -e) instead
          # of being misread as "no existing issue" and filing a duplicate.
          titles="$(gh issue list --state open --label canary --search "\"$TITLE\" in:title" --json title --jq '.[].title')"
          if printf '%s\n' "$titles" | grep -Fxq "$TITLE"; then
            echo "An open issue titled \"$TITLE\" already exists; skipping."
            exit 0
          fi
          gh issue create --title "$TITLE" --label canary --body "$(printf 'The weekly acceptance run failed on the %s leg.\n\nRun: %s\n\nInvestigate against the GAM test network, then close this issue once the run is green again.\n' "$CLI" "$RUN_URL")"
