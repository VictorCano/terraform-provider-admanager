# Runs on every PR and push to main. All jobs are required for merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - run: go vet ./...
      - run: go build -v ./...
      - name: Schema version / state upgrader guard
        run: sh tools/ci/schema_version_guard.sh internal/provider
      - name: Acceptance-test hygiene guard
        run: sh tools/ci/acc_test_guard.sh internal/provider
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage ratchet
        # Coverage must not drop below the pinned floor. If a drop is
        # intentional and justified, lower the value in
        # .github/coverage-floor.txt in the same PR.
        run: |
          floor="$(cat .github/coverage-floor.txt)"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')"
          echo "Total coverage: ${total}% (floor: ${floor}%)"
          awk -v t="$total" -v f="$floor" 'BEGIN { exit (t + 0 < f + 0) ? 1 : 0 }' || {
            echo "::error::Coverage ${total}% is below the floor ${floor}%. Add tests, or if this drop is intentional and justified, lower the value in .github/coverage-floor.txt." >&2
            exit 1
          }

  fuzz:
    # Bounded fuzzing of the untrusted-input parsers (Retry-After, SOAP faults,
    # resource-name id extraction, and value-envelope XML escaping). Runs each
    # target for a short, fixed budget so it fits a normal CI run. Not a gate on
    # its own; the committed seed corpora (including regression crashers) also
    # run as ordinary unit tests in the build job.
    name: Fuzz (bounded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Fuzz each target for 15s
        # go test -fuzz accepts a single target per invocation, so loop them
        # serially. Each entry is "package target".
        run: |
          set -euo pipefail
          targets="
          ./internal/client FuzzParseRetryAfter
          ./internal/soap FuzzParseFault
          ./internal/soap FuzzKeyIDFromResourceName
          ./internal/soap FuzzValueIDFromResourceName
          ./internal/soap FuzzValueEnvelopeRoundTrip
          "
          echo "$targets" | while read -r pkg target; do
            [ -z "$pkg" ] && continue
            echo "== fuzzing $target in $pkg =="
            go test -run '^$' -fuzz "^${target}$" -fuzztime=15s "$pkg"
          done

  lint:
    # golangci-lint runs with gosec enabled (see .golangci.yml), so this job
    # is also the blocking static security analysis pass.
    name: Lint (incl. gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  secrets:
    # Defense in depth: trufflehog also runs in local git hooks, but hooks
    # can be bypassed; CI cannot.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          extra_args: --results=verified,unknown

  docs:
    name: Docs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false
      - name: Regenerate docs and fail on diff
        run: |
          go run github.com/hashicorp/terraform-plugin-docs/cmd/tfplugindocs@v0.25.0 generate
          git diff --exit-code -- docs/ || {
            echo "docs/ is out of date. Run tfplugindocs generate and commit the result." >&2
            exit 1
          }
